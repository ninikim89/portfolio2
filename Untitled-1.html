<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naiya Dave | Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; }
        
        /* The main portfolio container */
        .portfolio-frame {
            width: 100%;
            height: 100vh;
            border: none;
        }

        /* Floating link to your future Developer Portfolio */
        .dev-link {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            color: #000;
            font-family: sans-serif;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Your PeachWeb Portfolio -->
    <iframe 
        src="https://romantic-bgbtwu.peachweb.site/" 
        class="portfolio-frame" 
        allow="xr-spatial-tracking">
    </iframe>

    <!-- Link to your upcoming custom-coded portfolio -->
    <a href="https://naiyadev.vercel.app/" class="dev-link">View Other Developer Portfolio</a>

</body>
</html>
